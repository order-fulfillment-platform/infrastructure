apiVersion: v1
kind: ConfigMap
metadata:
  name: payment-service-config
  namespace: ofp
data:
  SPRING_DATASOURCE_URL: jdbc:postgresql://payment-postgres:5432/payment_db
  SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: ofp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
    spec:
      containers:
        - name: payment-service
          image: payment-service
          imagePullPolicy: Never
          ports:
            - containerPort: 8083
          envFrom:
            - configMapRef:
                name: payment-service-config
          env:
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: payment-postgres-secret
                  key: username
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: payment-postgres-secret
                  key: password
          resources:
            requests:
              memory: "512Mi"
              cpu: "200m"
            limits:
              memory: "1Gi"
              cpu: "500m"

---
apiVersion: v1
kind: Service
metadata:
  name: payment-service
  namespace: ofp
spec:
  selector:
    app: payment-service
  ports:
    - port: 8083
      targetPort: 8083 
    
