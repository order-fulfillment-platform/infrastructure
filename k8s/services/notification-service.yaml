apiVersion: v1
kind: ConfigMap
metadata:
  name: notification-service-config
  namespace: ofp
data:
  SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: ofp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: notification-service
          imagePullPolicy: Never
          ports:
            - containerPort: 8084
          envFrom:
            - configMapRef:
                name: notification-service-config
          resources:
            requests:
              memory: "512Mi"
              cpu: "200m"
            limits:
              memory: "1Gi"
              cpu: "500m"

---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: ofp
spec:
  selector:
    app: notification-service
  ports:
    - port: 8084
      targetPort: 8084


      