apiVersion: v1
kind: Secret
metadata:
  name: inventory-postgres-secret
  namespace: ofp
type: Opaque
stringData:
  username: postgres
  password: postgres

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: inventory-postgres-pvc
  namespace: ofp
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-postgres
  namespace: ofp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inventory-postgres
  template:
    metadata:
      labels:
        app: inventory-postgres
    spec:
      containers:
        - name: inventory-postgres
          image: postgres:16
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: inventory_db
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: inventory-postgres-secret
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: inventory-postgres-secret
                  key: password
          volumeMounts:
            - name: inventory-postgres-storage
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: inventory-postgres-storage
          persistentVolumeClaim:
            claimName: inventory-postgres-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: inventory-postgres
  namespace: ofp
spec:
  selector:
    app: inventory-postgres
  ports:
    - port: 5432
      targetPort: 5432

            
